name: Benchmark Law Review Monitor

on:
  # Allows your iPhone/Orchestrator to trigger this repo
  repository_dispatch:
    types: [trigger-all-repos]
    
  # Manual trigger button in GitHub Actions tab
  workflow_dispatch: 

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: pip install requests
        
      - name: Run Script
        run: python monitor.py 
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          # FIX: Forces the Linux runner to use Melbourne time for the Python script
          TZ: 'Australia/Melbourne'
