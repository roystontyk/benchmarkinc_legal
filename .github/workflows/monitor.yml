name: Benchmark Law Review Monitor

on:
  # Allows external trigger (e.g. from your other repo/dispatch)
  repository_dispatch:
    types: [trigger-all-repos]
  
  # Manual trigger button in GitHub Actions tab
  workflow_dispatch:
    inputs:
      mode:
        description: 'Include Daily Cases?'
        required: true
        default: 'summary'
        type: choice
        options:
          - summary # 2-week report only
          - cases   # 2-week report + Daily additions

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: pip install requests
        
      - name: Run Script
        run: python monitor.py 
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          # Captures the choice from the button click
          RUN_MODE: ${{ github.event.inputs.mode || github.event.action }}
          TZ: 'Australia/Melbourne'
